<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>React Tic Tac Toe</title>

    <!-- React CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>

    <!-- React DOM -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #9bb7e2;
            font-family: Arial;
        }
        
        .game {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
        }
        
        .board-row {
            display: flex;
        }
        
        .square {
            width: 80px;
            height: 80px;
            margin: 5px;
            border: 2px solid #333;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            background: white;
            border-radius: 10px;
        }
        
        .square:hover {
            background: #dce7ff;
        }
        
        .status {
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        
        .game-info button {
            padding: 8px 15px;
            margin-bottom: 10px;
            border: none;
            background: #222;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .game-info button:hover {
            background: #444;
        }
    </style>

</head>

<body>

    <div id="root"></div>

    <script type="text/babel">

        // Square Component function Square({ value, onSquareClick }) { return (

        <button className="square" onClick={onSquareClick}>

          {value}

        </button> ); } // Board Component function Board({ xIsNext, squares, onPlay }) { function handleClick(i) { if (calculateWinner(squares) || squares[i]) { return; } const nextSquares = squares.slice(); if (xIsNext) { nextSquares[i] = "X";
        } else { nextSquares[i] = "O"; } onPlay(nextSquares); } const winner = calculateWinner(squares); let status; if (winner) { status = "Winner: " + winner; } else { status = "Next Player: " + (xIsNext ? "X" : "O"); } return (

        <>

            <div className="status">

                {status}

            </div>

            <div className="board-row">

                <Square value={squares[0]} onSquareClick={()=> handleClick(0)} />
                    <Square value={squares[1]} onSquareClick={()=> handleClick(1)} />
                        <Square value={squares[2]} onSquareClick={()=> handleClick(2)} />

            </div>

            <div className="board-row">

                <Square value={squares[3]} onSquareClick={()=> handleClick(3)} />
                    <Square value={squares[4]} onSquareClick={()=> handleClick(4)} />
                        <Square value={squares[5]} onSquareClick={()=> handleClick(5)} />

            </div>

            <div className="board-row">

                <Square value={squares[6]} onSquareClick={()=> handleClick(6)} />
                    <Square value={squares[7]} onSquareClick={()=> handleClick(7)} />
                        <Square value={squares[8]} onSquareClick={()=> handleClick(8)} />

            </div>

            </> ); } // Main Game Component function Game() { const [history, setHistory] = React.useState( [Array(9).fill(null)] ); const [currentMove, setCurrentMove] = React.useState(0); const xIsNext = currentMove % 2 === 0; const currentSquares = history[currentMove];
            function handlePlay(nextSquares) { const nextHistory = [ ...history.slice(0, currentMove + 1), nextSquares ]; setHistory(nextHistory); setCurrentMove(nextHistory.length - 1); } function jumpTo(nextMove) { setCurrentMove(nextMove); } const
            moves = history.map((squares, move) => { let description; if (move > 0) { description = "Go to move #" + move; } else { description = "Go to game start"; } return (

            <li key={move}>

                <button onClick={()=> jumpTo(move)}>

              {description}

            </button>

            </li>

            ); }); return (

            <div className="game">

                <div className="game-board">

                    <Board xIsNext={xIsNext} squares={currentSquares} onPlay={handlePlay} />

                </div>

                <div className="game-info">

                    <ol>{moves}</ol>

                </div>

            </div>

            ); } // Winner Function function calculateWinner(squares) { const lines = [ [0, 1, 2], [3, 4, 5], [6, 7, 8], [0, 3, 6], [1, 4, 7], [2, 5, 8], [0, 4, 8], [2, 4, 6] ]; for (let i = 0; i
            < lines.length; i++) { const [a, b, c]=l ines[i]; if (
                squares[a] && squares[a]===s quares[b] && squares[a]===s quares[c] ) { return squares[a]; } } return null; } // Render App const root=R eactDOM.createRoot( document.getElementById( "root") ); root.render(<Game />);

    </script>

</body>

</html>
