<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>

    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #222;
            color: white;
            font-family: Arial;
            margin: 0;
        }
        
        h1 {
            margin-bottom: 10px;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 90vw;
            max-width: 400px;
            aspect-ratio: 1/1;
            gap: 5px;
        }
        
        .cell {
            background: white;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8vw;
            cursor: pointer;
            border-radius: 10px;
        }
        
        @media (min-width: 600px) {
            .cell {
                font-size: 40px;
            }
        }
        
        .cell:hover {
            background: lightgray;
        }
        
        #status {
            margin: 15px;
            font-size: 20px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background: orange;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h1>Tic Tac Toe</h1>
    <div id="status">Player X's turn</div>

    <div class="board" id="board">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
    </div>

    <button onclick="resetGame()">Restart</button>
    <script>
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');

        let currentPlayer = 'X';
        let board = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;

        const winPatterns = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8], //rows
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8], //column
            [0, 4, 8],
            [2, 4, 6] //diagonal
        ];

        cells.forEach((cell, index) => {
            cell.addEventListener('click', () => handleClick(cell, index));
        });

        function handleClick(cell, index) {
            if (board[index] !== "" || !gameActive) return;

            board[index] = currentPlayer;
            cell.textContent = currentPlayer;

            if (checkWinner()) {
                statusText.textContent = `Player ${currentPlayer} wins!`;
                gameActive = false;
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            statusText.textContent = `Player ${currentPlayer}'s turn`;
        }

        function checkWinner() {
            return winPatterns.some(pattern => {
                const [a, b, c] = pattern;
                return board[a] &&
                    board[a] === board[b] &&
                    board[a] === board[c];
            });
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", "", ];
            gameActive = true;
            currentPlayer = 'X';
            statusText.textContent = "Player X's turn";
            cells.forEach(cell => cell.textContent = "");

        }
    </script>

</body>

</html>
