<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind Flexbox Website</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <!-- Hero Section -->
    <section class="flex flex-col justify-center items-center text-center h-[400px] bg-gradient-to-r from-blue-500 to-cyan-400 text-white">

        <h1 class="text-5xl font-bold mb-4">
            Welcome to My Website
        </h1>

        <p class="text-xl">
            Build modern layouts using Tailwind Flexbox
        </p>

    </section>

    <!-- Cards Section -->
    <section class="flex flex-wrap justify-center gap-8 p-10">

        <!-- Card 1 -->
        <div class="bg-white w-[250px] p-5 rounded-xl shadow-lg text-center">

            <img src="https://picsum.photos/250/150?1" class="rounded-lg mb-4">

            <h2 class="text-2xl font-semibold mb-2">
                Web Design
            </h2>

            <p class="text-gray-600 mb-4">
                Create beautiful responsive websites easily.
            </p>

            <button class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2 rounded">
                Read More
            </button>

        </div>

        <!-- Card 2 -->
        <div class="bg-white w-[250px] p-5 rounded-xl shadow-lg text-center">

            <img src="https://picsum.photos/250/150?2" class="rounded-lg mb-4">

            <h2 class="text-2xl font-semibold mb-2">
                Flexbox Layout
            </h2>

            <p class="text-gray-600 mb-4">
                Learn powerful layout techniques with Flexbox.
            </p>

            <button class="bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded">
                Read More
            </button>

        </div>

        <!-- Card 3 -->
        <div class="bg-white w-[250px] p-5 rounded-xl shadow-lg text-center">

            <img src="https://picsum.photos/250/150?3" class="rounded-lg mb-4">

            <h2 class="text-2xl font-semibold mb-2">
                Responsive Design
            </h2>

            <p class="text-gray-600 mb-4">
                Make websites mobile-friendly and responsive.
            </p>

            <button class="bg-purple-500 hover:bg-purple-600 text-white px-5 py-2 rounded">
                Read More
            </button>

        </div>

    </section>
</body>

</html>
