<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Table Row</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .table-box {
            width: 650px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #0f172a;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 10px;
        }
        
        th {
            background: #2563eb;
            color: white;
            padding: 14px;
        }
        
        td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        
        tr:hover {
            background: #f1f5f9;
        }
        
        .delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .delete:hover {
            background: #dc2626;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="table-box">

        <h2>Remove Table Row</h2>

        <table id="myTable">

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Action</th>
            </tr>

            <tr>
                <td>1</td>
                <td>Rahul</td>
                <td>IT</td>
                <td><button class="delete">Delete</button></td>
            </tr>

            <tr>
                <td>2</td>
                <td>Priya</td>
                <td>HR</td>
                <td><button class="delete">Delete</button></td>
            </tr>

            <tr>
                <td>3</td>
                <td>Aman</td>
                <td>Finance</td>
                <td><button class="delete">Delete</button></td>
            </tr>

            <tr>
                <td>4</td>
                <td>Neha</td>
                <td>Marketing</td>
                <td><button class="delete">Delete</button></td>
            </tr>

        </table>

    </div>

    <script>
        $(document).ready(function() {

            $(".delete").click(function() {

                $(this).closest("tr").fadeOut(500, function() {

                    $(this).remove();

                });

            });

        });
    </script>

</body>

</html>
