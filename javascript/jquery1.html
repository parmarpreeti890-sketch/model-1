<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zebra Stripes Table</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .table-container {
            width: 550px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #0f172a;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 10px;
        }
        
        th {
            background: #2563eb;
            color: white;
            padding: 14px;
            font-size: 18px;
        }
        
        td {
            padding: 14px;
            text-align: center;
            transition: 0.3s;
        }
        
        .odd {
            background: #f8fafc;
        }
        
        .even {
            background: #dbeafe;
        }
        
        tr:hover td {
            background: #93c5fd;
            transform: scale(1.01);
        }
    </style>
</head>

<body>

    <div class="table-container">

        <h2>Zebra Stripes Table</h2>

        <table>

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Course</th>
            </tr>

            <tr>
                <td>1</td>
                <td>Rahul</td>
                <td>BCA</td>
            </tr>

            <tr>
                <td>2</td>
                <td>Priya</td>
                <td>B.Tech</td>
            </tr>

            <tr>
                <td>3</td>
                <td>Aman</td>
                <td>MCA</td>
            </tr>

            <tr>
                <td>4</td>
                <td>Neha</td>
                <td>BBA</td>
            </tr>

        </table>

    </div>

    <script>
        $(document).ready(function() {

            $("table tr:odd").addClass("odd");
            $("table tr:even").addClass("even");

        });
    </script>

</body>

</html>
